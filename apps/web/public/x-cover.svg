<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 600" width="1500" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0f1726"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glow" cx="75%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#2a9a7c" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2a9a7c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1500" height="600" fill="url(#bg)"/>
  <rect width="1500" height="600" fill="url(#glow)"/>

  <!-- ciphertext rain decoration -->
  <g font-family="ui-monospace, monospace" font-size="13" fill="#34d399" opacity="0.06">
    <text x="30" y="70">0x4a7f…b2e9</text>
    <text x="30" y="130">0x8c1d…f3a0</text>
    <text x="30" y="190">0x2d5e…9b47</text>
    <text x="30" y="250">0xe18c…6a2f</text>
    <text x="30" y="310">0x7a3f…e29b</text>
    <text x="30" y="370">0x4a7f…b2e9</text>
    <text x="30" y="430">0x8c1d…f3a0</text>
    <text x="30" y="490">0x2d5e…9b47</text>
    <text x="30" y="550">0xe18c…6a2f</text>
  </g>

  <!-- Veil mark (top left) -->
  <g transform="translate(80, 70)">
    <path d="M0 0 L26 56 L52 0" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M20 24 L32 42 L44 24" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3 4" opacity="0.5"/>
  </g>
  <text x="150" y="110" font-family="ui-sans-serif, system-ui" font-size="30" font-weight="600" fill="#f8fafc">Veil</text>

  <!-- Headline -->
  <text x="80" y="300" font-family="ui-sans-serif, system-ui" font-size="72" font-weight="700" fill="#f8fafc" letter-spacing="-2">
    <tspan x="80" dy="0">Encrypted by default.</tspan>
    <tspan x="80" dy="84" fill="url(#accent)">Yours to reveal.</tspan>
  </text>

  <!-- Subline -->
  <text x="80" y="480" font-family="ui-sans-serif, system-ui" font-size="24" fill="#a8b5c7">
    Wrap, unwrap &amp; decrypt ERC-7984 confidential tokens on Zama FHEVM.
  </text>

  <!-- Bottom badges -->
  <g font-family="ui-monospace, monospace" font-size="16" fill="#6b7889">
    <text x="80" y="540">Sepolia · ERC-7984 · EIP-712 decryption · @zama FHEVM</text>
  </g>

  <!-- Right side: live data card mockup -->
  <g transform="translate(1020, 140)">
    <rect x="0" y="0" width="380" height="320" rx="12" fill="#0f1726" stroke="#1e3a5f" stroke-width="1"/>
    <rect x="0" y="0" width="380" height="40" rx="12" fill="#162033"/>
    <text x="20" y="26" font-family="ui-sans-serif, system-ui" font-size="13" fill="#94a3b8" font-weight="500">LIVE REGISTRY</text>
    <circle cx="350" cy="20" r="4" fill="#34d399"/>

    <text x="20" y="80" font-family="ui-sans-serif, system-ui" font-size="12" fill="#64748b">Pairs registered</text>
    <text x="20" y="115" font-family="ui-monospace, monospace" font-size="36" font-weight="700" fill="#6ee7b7">9</text>

    <rect x="20" y="145" width="340" height="70" rx="8" fill="#0a0e1a" stroke="#2d1b4e" stroke-width="1"/>
    <text x="36" y="170" font-family="ui-monospace, monospace" font-size="11" fill="#a78bfa">USDC encrypted supply</text>
    <text x="36" y="195" font-family="ui-monospace, monospace" font-size="13" fill="#7c6bb5">0x7a3f8c…e29b</text>

    <text x="20" y="250" font-family="ui-sans-serif, system-ui" font-size="11" fill="#475569">ciphertext handle — FHE-encrypted</text>
    <text x="20" y="270" font-family="ui-sans-serif, system-ui" font-size="11" fill="#475569">unreadable without a permit</text>

    <rect x="20" y="290" width="340" height="2" fill="#1e3a5f"/>
    <text x="20" y="310" font-family="ui-monospace, monospace" font-size="10" fill="#475569">on-chain · live data</text>
  </g>
</svg>
