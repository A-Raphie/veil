<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0f1726"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#2a9a7c" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2a9a7c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- ciphertext rain decoration -->
  <g font-family="ui-monospace, monospace" font-size="14" fill="#34d399" opacity="0.08">
    <text x="40" y="80">0x4a7f…b2e9</text>
    <text x="40" y="160">0x8c1d…f3a0</text>
    <text x="40" y="240">0x2d5e…9b47</text>
    <text x="40" y="320">0xe18c…6a2f</text>
    <text x="40" y="400">0x7a3f…e29b</text>
    <text x="40" y="480">0x4a7f…b2e9</text>
    <text x="40" y="560">0x8c1d…f3a0</text>
  </g>

  <!-- Veil mark -->
  <g transform="translate(80, 80)">
    <path d="M0 0 L26 56 L52 0" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="150" y="125" font-family="ui-sans-serif, system-ui" font-size="32" font-weight="600" fill="#e2e8f0">Veil</text>

  <!-- Headline -->
  <text x="80" y="320" font-family="ui-sans-serif, system-ui" font-size="76" font-weight="700" fill="#f8fafc" letter-spacing="-2">
    <tspan x="80" dy="0">Encrypted by default.</tspan>
    <tspan x="80" dy="92" fill="url(#accent)">Yours to reveal.</tspan>
  </text>

  <!-- Subline -->
  <text x="80" y="510" font-family="ui-sans-serif, system-ui" font-size="26" fill="#a8b5c7">
    Wrap, unwrap &amp; decrypt ERC-7984 confidential tokens on Zama FHEVM.
  </text>

  <!-- Bottom badges -->
  <g font-family="ui-monospace, monospace" font-size="18" fill="#6b7889">
    <text x="80" y="570">Sepolia + Ethereum mainnet · ERC-7984 · EIP-712 decryption</text>
  </g>
</svg>
