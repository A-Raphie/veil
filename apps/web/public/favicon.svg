<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0a0e1a"/>
  <!-- The "veil" mark: a V formed by two strokes, one solid (revealed), one dashed (encrypted) -->
  <path d="M16 18 L32 46 L48 18" fill="none" stroke="url(#g)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- a thin dashed echo below, suggesting the hidden layer -->
  <path d="M20 24 L32 42 L44 24" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3 4" opacity="0.5"/>
</svg>
